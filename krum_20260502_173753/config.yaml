dataset:
    name: mnist
    split:
        mode: iid
        samples_per_node: 1000
        alpha: 1.0

model:
    name: mlp
    hidden_size: 32

topology:
    n_nodes: 500
    n_attackers: 0
    n_neighbors: 200
    seed: 42

training:
    n_rounds: 200
    local_epochs: 1
    batch_size: 64
    lr: 0.01
    n_workers: 5
    use_vectorized: true
    vmap_chunk: 0


dp:
  noise_mode: post_training    # User-level DP: train SGD → clip final update → noise
  clip_bound: 2.0
  noise_mult: 1.1
  delta: 1.0e-5
  epsilon_max: 8.0
  accountant: renyi_dpsgd
  accountant_params:
    alpha_list: [1.01, 1.05, 1.1, 1.25, 1.5, 1.75, 2, 2.5, 3, 4, 5, 6, 8, 10, 12, 16, 20, 32, 50, 64, 100, 128, 256, 512, 1000]
  sampling_rate: 0.05  # Poisson client subsampling: 1.0 = all clients/round, <1 = sampled

attack:
  type: scale
  scale_factor: -10.0
  start_round: 0

aggregation:
  type: krum
  params:
    n_attackers: 0             # expected number of Byzantine nodes (f)
    multi_k: 1                  # 1 = single Krum, >1 = Multi-Krum

output_dir: ./results
device: auto
seed: 42
